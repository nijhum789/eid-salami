<!DOCTYPE html>
<html>
<head>
<title>Eid Salami Quiz</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
color:white;
}

.box{
background:rgba(0,0,0,0.7);
width:340px;
margin:80px auto;
padding:20px;
border-radius:12px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
border:none;
border-radius:6px;
font-size:16px;
}

#timer{
font-size:20px;
color:#ffd700;
margin-bottom:10px;
}

#quiz{
display:none;
}
</style>

</head>

<body>

<div class="box">

<div id="start">

<h2>🕌 Eid Salami Quiz</h2>

<p>
There will be 10 quizzes of 100 seconds each.  
If you exceed 10 seconds per quiz, the quiz will not count.  
So please keep an eye on your watch.  
<br><br>
Thank you 🤝
</p>

<button onclick="startQuiz()">Quiz Started</button>

</div>

<div id="quiz">

<div id="timer">Time: 10</div>

<p id="question"></p>

<div id="answers"></div>

<h3>Balance: ৳<span id="money">0</span></h3>

<p>Wrong: <span id="wrong">0</span>/3</p>

<p>Redwanul ke apner salamir screenshot ti pathan 🙂</p>

</div>

</div>

<script>

let money=0;
let index=0;
let wrong=0;
let time=10;
let timer;

let questions=[

{q:"Which word becomes shorter when you add two letters?",a:["Short","Shorter","Long"],c:0},

{q:"If there are 3 apples and you take away 2, how many do you have?",a:["1","2","3"],c:1},

{q:"What can fill a room but takes no space?",a:["Air","Light","Sound"],c:1},

{q:"If you pass the person in 2nd place, what place are you in?",a:["1st","2nd","3rd"],c:1},

{q:"What has hands but cannot clap?",a:["Clock","Baby","Robot"],c:0},

{q:"What has one eye but cannot see?",a:["Needle","Storm","Cyclops"],c:0},

{q:"What gets wetter the more it dries?",a:["Sponge","Towel","Rain"],c:1},

{q:"What has many teeth but cannot bite?",a:["Comb","Shark","Saw"],c:0},

{q:"What goes up but never comes down?",a:["Age","Smoke","Balloon"],c:0},

{q:"Which question can you never answer yes to?",a:["Are you sleeping?","Are you alive?","Are you ready?"],c:0}

];

function startQuiz(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
load();
}

function startTimer(){

time=10;

document.getElementById("timer").innerText="Time: "+time;

timer=setInterval(()=>{

time--;

document.getElementById("timer").innerText="Time: "+time;

if(time<=0){

clearInterval(timer);

wrong++;

document.getElementById("wrong").innerText=wrong;

next();

}

},1000);

}

function load(){

clearInterval(timer);

let q=questions[index];

document.getElementById("question").innerText=q.q;

let html="";

q.a.forEach((a,i)=>{

html+=`<button onclick="check(${i})">${a}</button><br>`;

});

document.getElementById("answers").innerHTML=html;

startTimer();

}

function check(i){

clearInterval(timer);

if(i==questions[index].c){

money+=100;

document.getElementById("money").innerText=money;

}else{

wrong++;

document.getElementById("wrong").innerText=wrong;

}

next();

}

function next(){

if(wrong>=3){

document.getElementById("question").innerText="❌ Too many wrong answers!";

document.getElementById("answers").innerHTML="";

document.getElementById("timer").innerText="";

return;

}

index++;

if(index<questions.length){

load();

}else{

document.getElementById("question").innerText="🎉 Quiz Finished!";

document.getElementById("answers").innerHTML="";

document.getElementById("timer").innerText="";

}

}

</script>

</body>
</html>
