<!DOCTYPE html>
<html>
<head>
<title>Eid Salami Quiz</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
color:white;
}

.box{
background:rgba(0,0,0,0.7);
width:330px;
margin:80px auto;
padding:20px;
border-radius:12px;
}

button{
padding:10px;
margin:6px;
cursor:pointer;
border:none;
border-radius:6px;
}

#salami{
margin-top:15px;
font-size:14px;
color:#ffd700;
}
</style>

</head>

<body>

<div class="box">

<h2>🕌 Eid Mubarak Quiz</h2>

<p id="question"></p>

<div id="answers"></div>

<h3>Salami: ৳<span id="money">0</span></h3>

<p>Wrong: <span id="wrong">0</span>/3</p>

<p id="salami">
Redwanul ke apner ei salamir request ti pathan 🙂
</p>

</div>

<script>

let money=0;
let index=0;
let wrong=0;

let questions=[

{q:"If you throw a red stone into the blue sea, what will it become?",a:["Wet","Blue","Heavy"],c:0},

{q:"Which word is always spelled incorrectly?",a:["Incorrectly","Wrong","Error"],c:0},

{q:"What can travel around the world while staying in the same corner?",a:["Stamp","Shadow","Wind"],c:0},

{q:"How many animals did Moses take on the ark?",a:["2","None","All"],c:1},

{q:"Which number comes next? 1, 11, 21, 1211, 111221, ?",a:["312211","111222","221113"],c:0},

{q:"If you have it, you want to share it. If you share it, you don't have it. What is it?",a:["Secret","Money","Time"],c:0},

{q:"What has a neck but no head?",a:["Bottle","River","Tree"],c:0},

{q:"What gets bigger the more you take away?",a:["Hole","Balloon","Shadow"],c:0},

{q:"Which weighs more: a ton of feathers or a ton of bricks?",a:["Feathers","Bricks","Same"],c:2},

{q:"If a rooster lays an egg on the roof, which way does it roll?",a:["Left","Right","Roosters don't lay eggs"],c:2}

];

function load(){

let q=questions[index];

document.getElementById("question").innerText=q.q;

let html="";

q.a.forEach((a,i)=>{
html+=`<button onclick="check(${i})">${a}</button><br>`;
});

document.getElementById("answers").innerHTML=html;

}

function check(i){

if(i==questions[index].c){

money+=100;
document.getElementById("money").innerText=money;

}else{

wrong++;
document.getElementById("wrong").innerText=wrong;

}

if(wrong>=3){

document.getElementById("question").innerText="❌ Too many wrong answers!";
document.getElementById("answers").innerHTML="";
return;

}

index++;

if(index<questions.length){

load();

}else{

document.getElementById("question").innerText="🎉 Quiz Finished!";
document.getElementById("answers").innerHTML="";

}

}

load();

</script>

</body>
</html>
